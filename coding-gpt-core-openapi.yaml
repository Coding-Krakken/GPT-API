components:
  schemas:
    RepoReadContextRequest:
      properties:
        repo_path:
          type: string
          title: Repo Path
        files:
          items:
            type: string
          type: array
          title: Files
        max_bytes_per_file:
          type: integer
          title: Max Bytes Per File
          default: 50000
      type: object
      required:
      - repo_path
      - files
      title: RepoReadContextRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    RunTestRequest:
      properties:
        workspace_path:
          type: string
          title: Workspace Path
        command_name:
          type: string
          title: Command Name
        timeout_seconds:
          type: integer
          title: Timeout Seconds
          default: 120
      type: object
      required:
      - workspace_path
      - command_name
      title: RunTestRequest
    RepoSymbolsRequest:
      properties:
        repo_path:
          type: string
          title: Repo Path
        files:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Files
      type: object
      required:
      - repo_path
      title: RepoSymbolsRequest
    RepoRelevantContextRequest:
      properties:
        repo_path:
          type: string
          title: Repo Path
        task:
          type: string
          title: Task
        diagnostics:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Diagnostics
        max_files:
          type: integer
          title: Max Files
          default: 12
      type: object
      required:
      - repo_path
      - task
      title: RepoRelevantContextRequest
    CodingTaskRequest:
      properties:
        repo_path:
          type: string
          title: Repo Path
        task:
          type: string
          title: Task
        mode:
          type: string
          title: Mode
          default: plan_apply_verify
        workspace_strategy:
          type: string
          title: Workspace Strategy
          default: git_worktree
        max_iterations:
          type: integer
          title: Max Iterations
          default: 5
        approval_policy:
          type: string
          title: Approval Policy
          default: safe_auto
        create_pr:
          type: boolean
          title: Create Pr
          default: false
        base_branch:
          anyOf:
          - type: string
          - type: 'null'
          title: Base Branch
        task_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Task Id
        compact_response:
          type: boolean
          title: Compact Response
          default: true
      type: object
      required:
      - repo_path
      - task
      title: CodingTaskRequest
    RepoOverviewRequest:
      properties:
        repo_path:
          type: string
          title: Repo Path
        max_depth:
          type: integer
          title: Max Depth
          default: 4
      type: object
      required:
      - repo_path
      title: RepoOverviewRequest
    RepoSearchRequest:
      properties:
        repo_path:
          type: string
          title: Repo Path
        query:
          type: string
          title: Query
        globs:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Globs
        max_results:
          type: integer
          title: Max Results
          default: 50
      type: object
      required:
      - repo_path
      - query
      title: RepoSearchRequest
    CodingTaskNextRequest:
      properties:
        task_id:
          type: string
          title: Task Id
      type: object
      required:
      - task_id
      title: CodingTaskNextRequest
    QualityCheckRequest:
      properties:
        workspace_path:
          type: string
          title: Workspace Path
        timeout_seconds:
          type: integer
          title: Timeout Seconds
          default: 120
      type: object
      required:
      - workspace_path
      title: QualityCheckRequest
    CodingTaskSmokeTestRequest:
      properties:
        repo_path:
          type: string
          title: Repo Path
        task:
          type: string
          title: Task
          default: Smoke-test all uploadable Coding GPT core endpoints safely.
        safe_only:
          type: boolean
          title: Safe Only
          default: true
        approval_policy:
          type: string
          title: Approval Policy
          default: safe_auto
        max_iterations:
          type: integer
          title: Max Iterations
          default: 1
      type: object
      required:
      - repo_path
      title: CodingTaskSmokeTestRequest
    CodingTaskRepairPlanRequest:
      properties:
        task_id:
          type: string
          title: Task Id
        max_files:
          type: integer
          title: Max Files
          default: 12
      type: object
      required:
      - task_id
      title: CodingTaskRepairPlanRequest
    WorkspacePathRequest:
      properties:
        workspace_path:
          type: string
          title: Workspace Path
      type: object
      required:
      - workspace_path
      title: WorkspacePathRequest
    EnvPrepareApprovedRequest:
      properties:
        workspace_path:
          type: string
          title: Workspace Path
        approved:
          type: boolean
          title: Approved
          default: false
      type: object
      required:
      - workspace_path
      title: EnvPrepareApprovedRequest
    EnvRequest:
      properties:
        workspace_path:
          type: string
          title: Workspace Path
      type: object
      required:
      - workspace_path
      title: EnvRequest
    CodingTaskFinalizeRequest:
      properties:
        task_id:
          type: string
          title: Task Id
        commit:
          type: boolean
          title: Commit
          default: false
        commit_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Commit Message
        create_pr:
          type: boolean
          title: Create Pr
          default: false
        pr_title:
          anyOf:
          - type: string
          - type: 'null'
          title: Pr Title
        pr_body:
          type: string
          title: Pr Body
          default: ''
        user_approved_network_write:
          type: boolean
          title: User Approved Network Write
          default: false
        enforce_contract:
          type: boolean
          title: Enforce Contract
          default: true
      type: object
      required:
      - task_id
      title: CodingTaskFinalizeRequest
    CodingTaskContractReportRequest:
      properties:
        task_id:
          type: string
          title: Task Id
      type: object
      required:
      - task_id
      title: CodingTaskContractReportRequest
    CodingTaskSubmitRequest:
      properties:
        task_id:
          type: string
          title: Task Id
        artifact_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Artifact Name
        artifact:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Artifact
        patch:
          anyOf:
          - type: string
          - type: 'null'
          title: Patch
        run_tests:
          type: boolean
          title: Run Tests
          default: false
        run_quality:
          type: boolean
          title: Run Quality
          default: false
      type: object
      required:
      - task_id
      title: CodingTaskSubmitRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
servers:
- url: https://unscrutinized-immotile-jermaine.ngrok-free.dev
security:
- ApiKeyAuth: []
