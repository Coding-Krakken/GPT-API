components:
  schemas:
    AppRequest:
      properties:
        action:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Action"
        app:
          anyOf:
            - type: "string"
            - type: "null"
          title: "App"
        args:
          type: "string"
          title: "Args"
          default: ""
        filter:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Filter"
        limit:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "Limit"
          default: 100
        offset:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "Offset"
          default: 0
        window_title:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Window Title"
        x:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "X"
        y:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "Y"
        width:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "Width"
        height:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "Height"
        pid:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "Pid"
        window_index:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "Window Index"
          default: 0
      type: "object"
      title: "AppRequest"
    CategoryActionRequest:
      properties:
        action:
          type: "string"
          title: "Action"
          description: "Allowlisted action name for this category."
        payload:
          additionalProperties: true
          type: "object"
          title: "Payload"
          description: "Required action-specific payload. Never omit this. Example: {'repo_path': '/home/obsidian/Elevate_test'} for repo actions."
      type: "object"
      required:
        - "action"
        - "payload"
      title: "CategoryActionRequest"
    CodeAction:
      properties:
        action:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Action"
        path:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Path"
        language:
          type: "string"
          title: "Language"
        args:
          type: "string"
          title: "Args"
          default: ""
        fault:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Fault"
        content:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Content"
        actions:
          anyOf:
            -
              items:
                type: "string"
              type: "array"
            - type: "null"
          title: "Actions"
      type: "object"
      required:
        - "language"
      title: "CodeAction"
      description: "action: required unless actions is provided, one of [run, test, lint, fix, format, explain]\npath: required unless content is provided\ncontent: optional, if provided will be written to a temp file and executed\nlanguage: required, must be one of ['python', 'js', 'bash', 'node']\nargs: optional, string of CLI args (validated per language/action)\nactions: optional, list of actions for chaining\nNote: If language is omitted, request will be rejected."
    CodingActionRequest:
      properties:
        action:
          type: "string"
          title: "Action"
          description: "Allowlisted action name for this category."
        payload:
          additionalProperties: true
          type: "object"
          title: "Payload"
          description: "Required action-specific payload. Never omit this. Example: {'repo_path': '/home/obsidian/Elevate_test'} for repo actions."
        category:
          type: "string"
          title: "Category"
          description: "Allowlisted category: repo, workspace, patch, test, quality, diagnostics, policy, tasks, github, env. Unsupported categories such as shell/files/git/package are blocked."
      type: "object"
      required:
        - "action"
        - "payload"
        - "category"
      title: "CodingActionRequest"
    CodingTaskContractReportRequest:
      properties:
        task_id:
          type: "string"
          title: "Task Id"
      type: "object"
      required:
        - "task_id"
      title: "CodingTaskContractReportRequest"
    CodingTaskFinalizeRequest:
      properties:
        task_id:
          type: "string"
          title: "Task Id"
        commit:
          type: "boolean"
          title: "Commit"
          default: false
        commit_message:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Commit Message"
        create_pr:
          type: "boolean"
          title: "Create Pr"
          default: false
        pr_title:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Pr Title"
        pr_body:
          type: "string"
          title: "Pr Body"
          default: ""
        user_approved_network_write:
          type: "boolean"
          title: "User Approved Network Write"
          default: false
        enforce_contract:
          type: "boolean"
          title: "Enforce Contract"
          default: true
      type: "object"
      required:
        - "task_id"
      title: "CodingTaskFinalizeRequest"
    CodingTaskNextRequest:
      properties:
        task_id:
          type: "string"
          title: "Task Id"
      type: "object"
      required:
        - "task_id"
      title: "CodingTaskNextRequest"
    CodingTaskRepairPlanRequest:
      properties:
        task_id:
          type: "string"
          title: "Task Id"
        max_files:
          type: "integer"
          title: "Max Files"
          default: 12
      type: "object"
      required:
        - "task_id"
      title: "CodingTaskRepairPlanRequest"
    CodingTaskRequest:
      properties:
        repo_path:
          type: "string"
          title: "Repo Path"
        task:
          type: "string"
          title: "Task"
        mode:
          type: "string"
          title: "Mode"
          default: "plan_apply_verify"
        workspace_strategy:
          type: "string"
          title: "Workspace Strategy"
          default: "git_worktree"
        max_iterations:
          type: "integer"
          title: "Max Iterations"
          default: 5
        approval_policy:
          type: "string"
          title: "Approval Policy"
          default: "safe_auto"
        create_pr:
          type: "boolean"
          title: "Create Pr"
          default: false
        base_branch:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Base Branch"
        task_id:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Task Id"
        compact_response:
          type: "boolean"
          title: "Compact Response"
          default: true
      type: "object"
      required:
        - "repo_path"
        - "task"
      title: "CodingTaskRequest"
    CodingTaskSmokeTestRequest:
      properties:
        repo_path:
          type: "string"
          title: "Repo Path"
        task:
          type: "string"
          title: "Task"
          default: "Smoke-test all uploadable Coding GPT core endpoints safely."
        safe_only:
          type: "boolean"
          title: "Safe Only"
          default: true
        approval_policy:
          type: "string"
          title: "Approval Policy"
          default: "safe_auto"
        max_iterations:
          type: "integer"
          title: "Max Iterations"
          default: 1
      type: "object"
      required:
        - "repo_path"
      title: "CodingTaskSmokeTestRequest"
    CodingTaskSubmitRequest:
      properties:
        task_id:
          type: "string"
          title: "Task Id"
        artifact_name:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Artifact Name"
        artifact:
          anyOf:
            -
              additionalProperties: true
              type: "object"
            - type: "null"
          title: "Artifact"
        patch:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Patch"
        run_tests:
          type: "boolean"
          title: "Run Tests"
          default: false
        run_quality:
          type: "boolean"
          title: "Run Quality"
          default: false
      type: "object"
      required:
        - "task_id"
      title: "CodingTaskSubmitRequest"
    DiagnosticsParseRequest:
      properties:
        tool:
          type: "string"
          title: "Tool"
        stdout:
          type: "string"
          title: "Stdout"
          default: ""
        stderr:
          type: "string"
          title: "Stderr"
          default: ""
      type: "object"
      required:
        - "tool"
      title: "DiagnosticsParseRequest"
    DiagnosticsSuggestRequest:
      properties:
        diagnostics:
          items:
            additionalProperties: true
            type: "object"
          type: "array"
          title: "Diagnostics"
        max_files:
          type: "integer"
          title: "Max Files"
          default: 20
      type: "object"
      required:
        - "diagnostics"
      title: "DiagnosticsSuggestRequest"
    DiagnosticsTriageRequest:
      properties:
        diagnostics:
          items:
            additionalProperties: true
            type: "object"
          type: "array"
          title: "Diagnostics"
        task:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Task"
        max_files:
          type: "integer"
          title: "Max Files"
          default: 20
      type: "object"
      required:
        - "diagnostics"
      title: "DiagnosticsTriageRequest"
    DispatchRequest:
      properties:
        to:
          type: "string"
          title: "To"
        prompt:
          type: "string"
          title: "Prompt"
        issue:
          anyOf:
            - type: "integer"
            - type: "null"
          title: "Issue"
        from_agent:
          anyOf:
            - type: "string"
            - type: "null"
          title: "From Agent"
        dry_run:
          type: "boolean"
          title: "Dry Run"
          default: false
        max_wait_seconds:
          type: "integer"
          title: "Max Wait Seconds"
          default: 420
        output_file_path:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Output File Path"
      type: "object"
      required:
        - "to"
        - "prompt"
      title: "DispatchRequest"
    DuplicateGPTRequest:
