            - type: "string"
            - type: "null"
          title: "User Data Dir"
        session_token:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Session Token"
        session_token_1:
          anyOf:
            - type: "string"
            - type: "null"
          title: "Session Token 1"
        headless:
          type: "boolean"
          title: "Headless"
          default: true
        create:
          type: "boolean"
          title: "Create"
          default: true
        max_wait_seconds:
          type: "integer"
          title: "Max Wait Seconds"
