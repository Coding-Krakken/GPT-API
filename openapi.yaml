components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
          - code
          - message
        status:
          type: integer
        debug:
          type: array
          items:
            type: string
        trace:
          type: string
    OperationMeta:
      type: object
      properties:
        ok:
          type: boolean
        status:
          type: integer
        latency_ms:
          type: number
        timestamp:
          type: integer
        request_id:
          type: string
        warnings:
          type: array
          items:
            type: string
    Diagnostic:
      type: object
      properties:
        file:
          type: string
        line:
          type: integer
        column:
          type: integer
        end_line:
          type: integer
        end_column:
          type: integer
        severity:
          type: string
          enum:
          - info
          - warning
          - error
          - fatal
        source:
          type: string
        code:
          type: string
        message:
          type: string
        suggestion:
          type: string
    PatchSuggestion:
      type: object
      properties:
        file:
          type: string
        diff:
          type: string
        explanation:
          type: string
        risk:
          type: string
          enum:
          - low
          - medium
          - high
    Artifact:
      type: object
      properties:
        type:
          type: string
        path:
          type: string
        content:
          type: string
        description:
          type: string
        sha256:
          type: string
    FileRange:
      type: object
      properties:
        start_line:
          type: integer
          minimum: 1
        end_line:
          type: integer
          minimum: 1
        start_column:
          type: integer
          minimum: 1
        end_column:
          type: integer
          minimum: 1
    CommandResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer
        duration_ms:
          type: number
        pid:
          type: integer
        job_id:
          type: string
        command:
          type: string
        meta:
          $ref: '#/components/schemas/OperationMeta'
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
