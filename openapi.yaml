openapi: 3.1.0
info:
  title: GPT Super-Agent Universal Control API
  description: Universal FastAPI-based control API for GPT agents to perform system
    operations (file, shell, code, package, git, apps, refactor, monitor, batch, etc.).
  version: 4.0.0
servers:
- url: https://gpt-api.ngrok.app
paths:
  /shell:
    post:
      operationId: runShellCommand
      summary: Execute controlled shell commands or manage background shell jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - command
              properties:
                action:
                  type: string
                  enum:
                  - run
                  - start
                  - status
                  - stop
                  - logs
                  default: run
                command:
                  type: string
                  minLength: 1
                  maxLength: 4096
                job_id:
                  type: string
                run_as_sudo:
                  type: boolean
                  default: false
                background:
                  type: boolean
                  default: false
                shell:
                  type: string
                  enum:
                  - /bin/bash
                  - /bin/sh
                  - bash
                  - sh
                  - powershell
                  - cmd
                working_dir:
                  type: string
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
                env:
                  type: object
                  additionalProperties:
                    type: string
                stdin:
                  type: string
                capture:
                  type: boolean
                  default: true
                max_output_bytes:
                  type: integer
                  minimum: 1024
                  maximum: 10485760
                allowed_exit_codes:
                  type: array
                  items:
                    type: integer
                  default:
                  - 0
                dry_run:
                  type: boolean
                  default: false
                confirm:
                  type: boolean
                  default: false
                  description: Set true only after explicit user approval for dangerous
                    operations such as background process launch, delete/restore overwrite,
                    package install/remove/update/upgrade, git checkout/reset/rebase/push,
                    or app launch/kill.
                confirmation:
                  type: string
                  description: Alternative explicit confirmation string. Accepted
                    examples include confirmed, approved, i understand, and yes-i-understand.
      responses:
        '200':
          description: Shell command or job result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResult'
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      description: 'Run commands synchronously, start background jobs, inspect job
        status/logs, or stop jobs. Prefer typed endpoints when available; use /shell
        as a controlled escape hatch.


        Dangerous operations require explicit confirmation using confirm: true or
        an accepted confirmation string. Unconfirmed dangerous operations return confirmation_required
        in the response body with status 403.'
  /dispatch:
    post:
      operationId: dispatchToAgent
      summary: Dispatch a task to a named agent via the Playwright container
      description: 'Sends a prompt to the target agent''s ChatGPT GPT using the Playwright

        browser container. Use this to hand off work between agents.

        Returns the conversation URL and dispatch status.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - to
              - prompt
              properties:
                to:
                  type: string
                  description: Target agent ID (e.g. "tech-lead", "product-owner",
                    "qa-test-engineer")
                  example: tech-lead
                prompt:
                  type: string
                  description: Full prompt to send to the target agent
                issue:
                  type: integer
                  description: GitHub issue number for task-state tracking
                from_agent:
                  type: string
                  description: Dispatching agent ID — marks it as completed in task
                    state
                  example: 00-chief-of-staff
                dry_run:
                  type: boolean
                  default: false
                  description: If true, returns the docker exec command without running
                    it
                max_wait_seconds:
                  type: integer
                  default: 420
      responses:
        '200':
          description: Dispatch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  dispatched_to:
                    type: string
                  conversation_url:
                    type: string
                  dispatch_depth:
                    type: integer
                  latency_ms:
                    type: number
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /files:
    post:
      operationId: manageFiles
      summary: Read, write, patch, inspect, and safely manipulate files or directories
      description: 'Unified file interface for single or batched operations, including
        hash-guarded writes, line-range edits, glob/tree discovery, snapshots, and
        restore operations.


        Dangerous operations require explicit confirmation using confirm: true or
        an accepted confirmation string. Unconfirmed dangerous operations return confirmation_required
        in the response body with status 403.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Single file operation or batch of file operations. If operations
                is present, top-level action/path are ignored.
              properties:
                action:
                  type: string
                  enum:
                  - read
                  - write
                  - append
                  - prepend
                  - patch
                  - replace_range
                  - insert_before
                  - insert_after
                  - delete_range
                  - delete
                  - copy
                  - move
                  - stat
                  - exists
                  - list
                  - mkdir
                  - tree
                  - glob
                  - checksum
                  - snapshot
                  - restore
                path:
                  type: string
                target_path:
                  type: string
                content:
                  type: string
                  maxLength: 10485760
                patch:
                  type: string
                range:
                  $ref: '#/components/schemas/FileRange'
                recursive:
                  type: boolean
                encoding:
                  type: string
                  default: utf-8
                create:
                  type: boolean
                overwrite:
                  type: boolean
                backup:
                  type: boolean
                expected_hash:
                  type: string
                glob:
                  type: string
                include_hidden:
                  type: boolean
                max_depth:
                  type: integer
                  minimum: 0
                  maximum: 64
                limit:
                  type: integer
                  minimum: 1
                  maximum: 10000
                operations:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - action
                    - path
                    properties:
                      action:
                        type: string
                        enum:
                        - read
                        - write
                        - append
                        - prepend
                        - patch
                        - replace_range
                        - insert_before
                        - insert_after
                        - delete_range
                        - delete
                        - copy
                        - move
                        - stat
                        - exists
                        - list
                        - mkdir
                        - tree
                        - glob
                        - checksum
                        - snapshot
                        - restore
                      path:
                        type: string
                      target_path:
                        type: string
                      content:
                        type: string
                        maxLength: 10485760
                      patch:
                        type: string
                      range:
                        $ref: '#/components/schemas/FileRange'
                      recursive:
                        type: boolean
                      encoding:
                        type: string
                        default: utf-8
                      create:
                        type: boolean
                      overwrite:
                        type: boolean
                      backup:
                        type: boolean
                      expected_hash:
                        type: string
                      glob:
                        type: string
                      include_hidden:
                        type: boolean
                      max_depth:
                        type: integer
                        minimum: 0
                        maximum: 64
                      limit:
                        type: integer
                        minimum: 1
                        maximum: 10000
                confirm:
                  type: boolean
                  default: false
                  description: Set true only after explicit user approval for dangerous
                    operations such as background process launch, delete/restore overwrite,
                    package install/remove/update/upgrade, git checkout/reset/rebase/push,
                    or app launch/kill.
                confirmation:
                  type: string
                  description: Alternative explicit confirmation string. Accepted
                    examples include confirmed, approved, i understand, and yes-i-understand.
      responses:
        '200':
          description: File operation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type:
                    - string
                    - object
                    - boolean
                  results:
                    type: array
                    items:
                      type: object
                  diff:
                    type: string
                  sha256:
                    type: string
                  backup_path:
                    type: string
                  meta:
                    $ref: '#/components/schemas/OperationMeta'
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
  /code:
    post:
      operationId: codeOps
      summary: Run, test, lint, format, analyze, debug, and review code
      description: Coding-focused operation endpoint. Supports file-based and content-based
        execution with structured diagnostics, artifacts, coverage summaries, and
        safe execution controls.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                  - run
                  - test
                  - lint
                  - fix
                  - format
                  - explain
                  - typecheck
                  - build
                  - install
                  - compile
                  - debug
                  - profile
                  - coverage
                  - benchmark
                  - static_analyze
                  - security_scan
                  - dependency_audit
                  - generate_tests
                  - review
                  - summarize
                  - trace
                  - repl
                actions:
                  type: array
                  items:
                    type: string
                  description: Optional action chain, e.g. [format, lint, test].
                path:
                  type: string
                content:
                  type: string
                  maxLength: 1000000
                language:
                  type: string
                  enum:
                  - python
                  - js
                  - javascript
                  - bash
                  - node
                  - typescript
                  - go
                  - rust
                  - java
                  - c
                  - cpp
                args:
                  type: string
                  description: Legacy argument string. Prefer argv.
                argv:
                  type: array
                  items:
                    type: string
                working_dir:
                  type: string
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
                env:
                  type: object
                  additionalProperties:
                    type: string
                stdin:
                  type: string
                files:
                  type: array
                  items:
                    type: string
                test_selector:
                  type: string
                coverage:
                  type: boolean
                fail_fast:
                  type: boolean
                max_output_bytes:
                  type: integer
                  minimum: 1024
                  maximum: 10485760
                dry_run:
                  type: boolean
                fault:
                  type: string
              anyOf:
              - required:
                - action
                - language
                - path
              - required:
                - action
                - language
                - content
              - required:
                - actions
                - language
                - path
              - required:
                - actions
                - language
                - content
      responses:
        '200':
          description: Code action result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    additionalProperties: true
                  diagnostics:
                    type: array
                    items:
                      $ref: '#/components/schemas/Diagnostic'
                  suggested_fixes:
                    type: array
                    items:
                      $ref: '#/components/schemas/PatchSuggestion'
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Artifact'
                  coverage_summary:
                    type: object
                  latency_ms:
                    type: number
                  timestamp:
                    type: integer
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
  /system:
    get:
      operationId: getSystemState
      summary: Retrieve system, runtime, coding toolchain, and capability information
      responses:
        '200':
          description: System capability report
          content:
            application/json:
              schema:
                type: object
                properties:
                  os:
                    type: string
                  arch:
                    type: string
                  hostname:
                    type: string
                  user:
                    type: string
                  cwd:
                    type: string
                  cpu_usage_percent:
                    type: number
                  memory:
                    type: object
                  disk:
                    type: object
                  shells:
                    type: array
                    items:
                      type: string
                  python:
                    type: object
                  node:
                    type: object
                  git:
                    type: object
                  package_managers:
                    type: array
                    items:
                      type: string
                  tools:
                    type: object
                    additionalProperties:
                      type: boolean
                  workspace_root:
                    type: string
                  limits:
                    type: object
                  meta:
                    $ref: '#/components/schemas/OperationMeta'
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      description: Reports OS, resources, user/session info, workspace roots, installed
        runtimes, package managers, and coding tool availability.
  /monitor:
    get:
      operationId: monitorHealthCheck
      summary: Health check for /monitor endpoint
      responses:
        '200':
          description: Health check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
    post:
      operationId: liveMonitor
      summary: Monitor resources, processes, jobs, logs, ports, filesystem, and test
        activity
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                  - cpu
                  - memory
                  - disk
                  - network
                  - logs
                  - filesystem
                  - performance
                  - process
                  - jobs
                  - ports
                  - docker
                  - git
                  - tests
                  - custom
                live:
                  type: boolean
                pid:
                  type: integer
                job_id:
                  type: string
                path:
                  type: string
                tail:
                  type: integer
                  minimum: 1
                  maximum: 10000
                since:
                  type: string
                interval_ms:
                  type: integer
                  minimum: 100
                samples:
                  type: integer
                  minimum: 1
                  maximum: 1000
                filter:
                  type: string
      responses:
        '200':
          description: Monitoring data
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  result:
                    type:
                    - string
                    - object
                  metrics:
                    type: object
                  events:
                    type: array
                    items:
                      type: object
                  logs:
                    type: array
                    items:
                      type: string
                  meta:
                    $ref: '#/components/schemas/OperationMeta'
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
  /git:
    post:
      operationId: gitControl
      summary: Perform typed Git operations for coding workflows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              - path
              properties:
                action:
                  type: string
                  enum:
                  - init
                  - status
                  - diff
                  - add
                  - commit
                  - branch
                  - checkout
                  - merge
                  - rebase
                  - pull
                  - push
                  - log
                  - show
                  - stash
                  - tag
                  - reset
                  - restore
                  - blame
                  - worktree
                  - clean
                  - apply_patch
                  - create_pr_summary
                path:
                  type: string
                args:
                  type: string
                  description: Legacy raw args. Prefer typed fields.
                files:
                  type: array
                  items:
                    type: string
                message:
                  type: string
                branch:
                  type: string
                base:
                  type: string
                remote:
                  type: string
                patch:
                  type: string
                dry_run:
                  type: boolean
                include_untracked:
                  type: boolean
                max_commits:
                  type: integer
                  minimum: 1
                  maximum: 1000
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
                confirm:
                  type: boolean
                  default: false
                  description: Set true only after explicit user approval for dangerous
                    operations such as background process launch, delete/restore overwrite,
                    package install/remove/update/upgrade, git checkout/reset/rebase/push,
                    or app launch/kill.
                confirmation:
                  type: string
                  description: Alternative explicit confirmation string. Accepted
                    examples include confirmed, approved, i understand, and yes-i-understand.
      responses:
        '200':
          description: Git operation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  stdout:
                    type: string
                  stderr:
                    type: string
                  exit_code:
                    type: integer
                  changed_files:
                    type: array
                    items:
                      type: string
                  diff:
                    type: string
                  summary:
                    type: string
                  branch:
                    type: string
                  commit:
                    type: string
                  meta:
                    $ref: '#/components/schemas/OperationMeta'
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      description: 'Inspect, diff, branch, commit, stash, apply patches, and generate
        PR-ready summaries with structured inputs and outputs.


        Dangerous operations require explicit confirmation using confirm: true or
        an accepted confirmation string. Unconfirmed dangerous operations return confirmation_required
        in the response body with status 403.'
  /package:
    post:
      operationId: packageManager
      summary: Manage project and system packages, lockfiles, audits, and dependency
        environments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - manager
              - action
              properties:
                manager:
                  type: string
                  enum:
                  - pip
                  - pipx
                  - poetry
                  - uv
                  - npm
                  - pnpm
                  - yarn
                  - apt
                  - pacman
                  - brew
                  - cargo
                  - go
                action:
                  type: string
                  enum:
                  - install
                  - remove
                  - update
                  - list
                  - upgrade
                  - audit
                  - freeze
                  - sync
                  - lock
                  - outdated
                  - resolve
                package:
                  type: string
                  description: Legacy single package name. Prefer packages.
                packages:
                  type: array
                  items:
                    type: string
                version:
                  type: string
                dev:
                  type: boolean
                global:
                  type: boolean
                working_dir:
                  type: string
                requirements_file:
                  type: string
                lockfile:
                  type: string
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
                dry_run:
                  type: boolean
                confirm:
                  type: boolean
                  default: false
                  description: Set true only after explicit user approval for dangerous
                    operations such as background process launch, delete/restore overwrite,
                    package install/remove/update/upgrade, git checkout/reset/rebase/push,
                    or app launch/kill.
                confirmation:
                  type: string
                  description: Alternative explicit confirmation string. Accepted
                    examples include confirmed, approved, i understand, and yes-i-understand.
      responses:
        '200':
          description: Package operation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  stdout:
                    type: string
                  stderr:
                    type: string
                  exit_code:
                    type: integer
                  packages:
                    type: array
                    items:
                      type: object
                  vulnerabilities:
                    type: array
                    items:
                      type: object
                  lockfile_changed:
                    type: boolean
                  changed_files:
                    type: array
                    items:
                      type: string
                  meta:
                    $ref: '#/components/schemas/OperationMeta'
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      description: 'Install, remove, audit, freeze, sync, lock, and inspect dependencies
        across common package managers.


        Dangerous operations require explicit confirmation using confirm: true or
        an accepted confirmation string. Unconfirmed dangerous operations return confirmation_required
        in the response body with status 403.'
  /apps:
    post:
      operationId: appControl
      summary: Launch, kill, or manipulate desktop and third-party applications, or
        manage windows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                  - launch
                  - kill
                  - list
                  - list_windows
                  - focus
                  - minimize
                  - maximize
                  - move
                  - resize
                  description: 'Action to perform. ''list_windows'' enumerates all
                    open windows (platform-specific). ''focus'', ''minimize'', ''maximize'',
                    ''move'', ''resize'' are GUI actions.

                    '
                app:
                  type: string
                  description: Application name (for launch/kill/focus, or as window
                    match hint)
                args:
                  type: string
                  description: Arguments to pass to the app (for launch)
                window_title:
                  type: string
                  description: Window title to match (for GUI actions)
                pid:
                  type: integer
                  description: Process ID to match (for GUI actions)
                window_index:
                  type: integer
                  description: Index of window to act on if multiple match (default
                    0)
                x:
                  type: integer
                  description: X position (for move/resize)
                y:
                  type: integer
                  description: Y position (for move/resize)
                width:
                  type: integer
                  description: Width (for resize)
                height:
                  type: integer
                  description: Height (for resize)
                limit:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  description: Max number of apps to return (for 'list')
                offset:
                  type: integer
                  minimum: 0
                  description: Offset for pagination (for 'list')
                filter:
                  type: string
                  maxLength: 128
                  description: Filter apps by name substring (for 'list')
                confirm:
                  type: boolean
                  default: false
                  description: Set true only after explicit user approval for dangerous
                    operations such as background process launch, delete/restore overwrite,
                    package install/remove/update/upgrade, git checkout/reset/rebase/push,
                    or app launch/kill.
                confirmation:
                  type: string
                  description: Alternative explicit confirmation string. Accepted
                    examples include confirmed, approved, i understand, and yes-i-understand.
      responses:
        '200':
          description: App control or window management output
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    result:
                      type: string
                - type: object
                  properties:
                    windows:
                      type: array
                      description: List of open windows (platform-specific fields)
                      items:
                        type: object
                        properties:
                          window_id:
                            type: string
                            description: Linux/X11 window ID (hex)
                          window_handle:
                            type: string
                            description: Windows window handle (decimal)
                          pid:
                            type: string
                            description: Process ID
                          process:
                            type: string
                            description: Process name
                          title:
                            type: string
                            description: Window title
                          desktop:
                            type: string
                            description: Linux/X11 desktop number
                          host:
                            type: string
                            description: Linux/X11 host
                          geometry:
                            type: object
                            properties:
                              x:
                                type: integer
                              y:
                                type: integer
                              width:
                                type: integer
                              height:
                                type: integer
                            description: Window geometry (Linux/X11)
                          state:
                            type: string
                            description: Window state (Linux/X11)
                    count:
                      type: integer
                      description: Number of windows returned
                    env:
                      type: object
                      description: Environment info (Linux/X11)
                      properties:
                        DISPLAY:
                          type: string
                        WAYLAND_DISPLAY:
                          type: string
        '400':
          description: Invalid input (e.g., empty command)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      description: 'Dangerous operations require explicit confirmation using confirm:
        true or an accepted confirmation string. Unconfirmed dangerous operations
        return confirmation_required in the response body with status 403.'
  /apps/capabilities:
    get:
      operationId: getAppCapabilities
      summary: Get supported /apps features for the current OS/session
      responses:
        '200':
          description: Capabilities for /apps endpoint
          content:
            application/json:
              schema:
                type: object
                properties:
                  os:
                    type: string
                  gui:
                    type: boolean
                  process_management:
                    type: boolean
                  window_management:
                    type: boolean
                  multi_window:
                    type: boolean
                  geometry:
                    type: boolean
                  state:
                    type: boolean
                  wayland:
                    type: boolean
                  x11:
                    type: boolean
                  tools:
                    type: object
                    additionalProperties:
                      type: boolean
                  python_version:
                    type: string
  /refactor:
    post:
      operationId: refactorCode
      summary: Perform safe literal, regex, symbol, AST, and codemod refactors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum:
                  - literal
                  - regex
                  - ast
                  - symbol
                  - import
                  - rename
                  - move
                  - extract_function
                  - inline_variable
                  - organize_imports
                  - codemod
                  default: literal
                replace:
                  type: string
                  maxLength: 10000
                symbol:
                  type: string
                new_name:
                  type: string
                language:
                  type: string
                dry_run:
                  type: boolean
                preview:
                  type: boolean
                apply:
                  type: boolean
                backup:
                  type: boolean
                files:
                  type: array
                  items:
                    type: string
                scope:
                  type: object
                  properties:
                    root:
                      type: string
                    include:
                      type: array
                      items:
                        type: string
                    exclude:
                      type: array
                      items:
                        type: string
                max_matches:
                  type: integer
                  minimum: 1
                  maximum: 100000
              anyOf:
              - required:
                - replace
                - replace
              - required:
                - mode
                - symbol
                - new_name
      responses:
        '200':
          description: Refactor preview or application result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                  changed_files:
                    type: array
                    items:
                      type: string
                  diff:
                    type: string
                  matches:
                    type: array
                    items:
                      type: object
                  risk_level:
                    type: string
                    enum:
                    - low
                    - medium
                    - high
                  meta:
                    $ref: '#/components/schemas/OperationMeta'
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      description: Mass refactoring endpoint with dry-run previews, scoped file selection,
        semantic modes, diffs, and risk reporting.
  /batch:
    post:
      operationId: bulkActions
      summary: Run multiple endpoint operations with dependencies, failure policy,
        and optional rollback semantics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - operations
              properties:
                mode:
                  type: string
                  enum:
                  - sequential
                  - parallel
                  - transaction
                  - dry_run
                  default: sequential
                stop_on_error:
                  type: boolean
                  default: false
                rollback_on_error:
                  type: boolean
                  default: false
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 7200
                shared_context:
                  type: object
                operations:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - action
                    properties:
                      id:
                        type: string
                      action:
                        type: string
                        description: Legacy operation type or endpoint alias.
                      endpoint:
                        type: string
                        enum:
                        - shell
                        - files
                        - code
                        - system
                        - monitor
                        - git
                        - package
                        - refactor
                        - batch
                      args:
                        type: object
                        additionalProperties: true
                        description: Legacy payload object.
                      payload:
                        type: object
                        additionalProperties: true
                      depends_on:
                        type: array
                        items:
                          type: string
                      rollback:
                        type: object
                        additionalProperties: true
                  description: 'Operations may include endpoint payloads; dangerous
                    nested payloads must carry confirm: true or confirmation.'
      responses:
        '200':
          description: Batch processing result
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                  ok:
                    type: boolean
                  failed_operation_id:
                    type: string
                  rollback_results:
                    type: array
                    items:
                      type: object
                  meta:
                    $ref: '#/components/schemas/OperationMeta'
        '400':
          description: Invalid request or rejected unsafe operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Execution or service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      description: 'Coordinates multi-step workflows across existing endpoints without
        adding new endpoints. Supports sequential, parallel, transaction, and dry-run
        modes.


        Rollback or nested operations that perform dangerous actions must include
        confirmation fields inside the nested payload, for example {''action'':''delete'',''confirm'':true}.'
  /gpts:
    post:
      operationId: manageGPTs
      summary: Duplicate and configure a custom ChatGPT GPT via browser automation
      description: Uses Playwright to duplicate or update a GPT editor page, configure
        name, description, instructions, API-key Action auth, and optionally create
        the GPT. Session credentials may come from the request body or environment
        variables.
      security:
      - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              - instructions
              properties:
                action:
                  type: string
                  enum:
                  - duplicate_and_configure
                  default: duplicate_and_configure
                source_editor_url:
                  type: string
                  description: GPT editor URL to duplicate
                  default: https://chatgpt.com/gpts/editor/g-6808e46f824481918e21feb6be82a4ab
                name:
                  type: string
                  description: Name for the duplicated GPT
                description:
                  type: string
                  description: Short description for the duplicated GPT
                instructions:
                  type: string
                  description: Full system instructions for the duplicated GPT
                action_name:
                  type: string
                  description: Label of the Action entry to configure in the Actions
                    section
                  default: unscrutinized-immotile-jermaine.ngrok-free.dev
                action_api_key:
                  type: string
                  description: API key to set for the Action's authentication (falls
                    back to ACTION_API_KEY env var)
                action_api_auth_type:
                  type: string
                  enum:
                  - basic
                  - bearer
                  - custom
                  default: bearer
                user_data_dir:
                  type: string
                  description: Path to a persistent Chromium profile directory for
                    session reuse
                session_token:
                  type: string
                  description: ChatGPT session cookie value (__Secure-next-auth.session-token
                    or .0 part)
                session_token_1:
                  type: string
                  description: ChatGPT session cookie .1 part (when token is split)
                headless:
                  type: boolean
                  default: true
                  description: Run Chromium in headless mode
                create:
                  type: boolean
                  default: true
                  description: Click the Create button to publish the GPT (false =
                    leave as draft)
                max_wait_seconds:
                  type: integer
                  default: 180
                  description: Maximum seconds to wait for page operations
      responses:
        '200':
          description: GPT duplication and configuration result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      ok:
                        type: boolean
                      stage:
                        type: string
                      source_editor_url:
                        type: string
                      duplicated_editor_url:
                        type: string
                      duplicated_gpt_id:
                        type: string
                      final_url:
                        type: string
                      created:
                        type: boolean
                  latency_ms:
                    type: number
                  timestamp:
                    type: integer
        '400':
          description: Invalid request or missing credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Browser automation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /script/run:
    post:
      operationId: runScript
      summary: Run a large script from request content
      description: Writes provided script content to a temporary file and executes
        it with bounded timeout, output capping, and secret redaction. Use this instead
        of oversized /shell commands.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - content
              properties:
                language:
                  type: string
                  enum:
                  - bash
                  - sh
                  - python
                  - node
                  - js
                  - javascript
                  default: bash
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000000
                working_dir:
                  type: string
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 3600
                  default: 120
                env:
                  type: object
                  additionalProperties:
                    type: string
                stdin:
                  type: string
                argv:
                  type: array
                  items:
                    type: string
                capture:
                  type: boolean
                  default: true
                max_output_bytes:
                  type: integer
                  minimum: 1024
                  maximum: 10485760
                  default: 1048576
                dry_run:
                  type: boolean
                  default: false
                keep_script:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Script execution result
        '403':
          description: Missing or invalid API key
        '422':
          description: Validation error
      security:
      - ApiKeyAuth: []
  /metrics:
