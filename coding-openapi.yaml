          - type: 'null'
          title: Run Id
        events_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Events Path
        report_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Report Id
      type: object
      title: EvalReportRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
